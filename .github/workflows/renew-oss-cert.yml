name: Renew OSS CNAME Certificate

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oss-cname-cert-renew
  cancel-in-progress: false

env:
  REGION_ID: cn-beijing
  BUCKET: secondorder-redirect
  DOMAINS: "nicelylit.net www.nicelylit.net"
  CERT_PREFIX: "auto-renew"
  ACME_HOME: "/home/runner/.acme.sh"
  CERT_OUT_DIR: "/home/runner/cert-out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  renew_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl openssl unzip

      - name: Install acme.sh
        shell: bash
        run: |
          curl https://get.acme.sh | sh -s email=admin@nicelylit.net
          echo "$HOME/.acme.sh" >> $GITHUB_PATH

      - name: Issue/Renew certificate via AliDNS (acme.sh)
        shell: bash
        env:
          Ali_Key: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          Ali_Secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          mkdir -p "${CERT_OUT_DIR}"

          CERT_NAME="${CERT_PREFIX}-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "CERT_NAME=$CERT_NAME" >> $GITHUB_ENV

          CERT_HOME="${CERT_OUT_DIR}/${CERT_NAME}"
          mkdir -p "${CERT_HOME}"

          acme.sh --issue --server letsencrypt --dns dns_ali \
            --cert-home "${CERT_HOME}" \
            -d nicelylit.net \
            -d www.nicelylit.net

          acme.sh --install-cert -d nicelylit.net \
            --cert-home "${CERT_HOME}" \
            --key-file       "${CERT_OUT_DIR}/private.key" \
            --fullchain-file "${CERT_OUT_DIR}/fullchain.pem"

          openssl x509 -in "${CERT_OUT_DIR}/fullchain.pem" -noout -subject -issuer -dates
          openssl x509 -in "${CERT_OUT_DIR}/fullchain.pem" -noout -text \
            | grep -A1 "Subject Alternative Name"

      # ── 核心修复：install.sh 只装 v1，必须手动下载 v2 ──────────────────
      - name: Install ossutil v2
        shell: bash
        env:
          AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          SK: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          # 从 Aliyun CDN 直接下载 ossutil v2（install.sh 装的是 v1，不含 api 子命令）
          curl -fsSL \
            "https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip" \
            -o /tmp/ossutil_v2.zip

          cd /tmp && unzip -o ossutil_v2.zip

          # zip 内部层级不固定，find 一下保险
          OSSUTIL_BIN=$(find /tmp -maxdepth 4 -name 'ossutil' -type f 2>/dev/null | head -1)
          if [ -z "${OSSUTIL_BIN}" ]; then
            echo "ERROR: ossutil binary not found after unzip" >&2
            ls -R /tmp/ossutil* 2>/dev/null || true
            exit 1
          fi
          sudo install -m 755 "${OSSUTIL_BIN}" /usr/local/bin/ossutil

          # 版本校验：必须是 v2.x，否则后续 api 子命令仍会失败
          INSTALLED_VER=$(ossutil --version 2>&1 | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          echo "ossutil version: ${INSTALLED_VER}"
          if echo "${INSTALLED_VER}" | grep -qP '^v1\.'; then
            echo "ERROR: Still ossutil v1 – check CDN URL" >&2
            exit 1
          fi

          # v2 config 语法：用长参数（v1 的 -e/-i/-k 在 v2 不适用）
          ossutil config \
            --endpoint "oss-${REGION_ID}.aliyuncs.com" \
            --access-key-id  "${AK}" \
            --access-key-secret "${SK}" \
            --region "${REGION_ID}"
      # ───────────────────────────────────────────────────────────────────────

      - name: Update OSS CNAME certificate for nicelylit.net and www.nicelylit.net (PutCname)
        shell: bash
        run: |
          CERT_FILE="${CERT_OUT_DIR}/fullchain.pem"
          KEY_FILE="${CERT_OUT_DIR}/private.key"

          if [ ! -s "${CERT_FILE}" ] || [ ! -s "${KEY_FILE}" ]; then
            echo "Missing cert or key file."
            exit 1
          fi

          xml_escape() {
            sed -e 's/&/\&amp;/g' \
                -e 's/</\&lt;/g' \
                -e 's/>/\&gt;/g' \
                -e "s/'/\&apos;/g" \
                -e 's/"/\&quot;/g'
          }

          CERT_ESCAPED="$(xml_escape < "${CERT_FILE}")"
          KEY_ESCAPED="$(xml_escape < "${KEY_FILE}")"

          for d in ${DOMAINS}; do
            XML_PATH="${CERT_OUT_DIR}/cname-${d}.xml"

            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<BucketCnameConfiguration>'
              echo '  <Cname>'
              printf '    <Domain>%s</Domain>\n'      "${d}"
              echo '    <CertificateConfiguration>'
              printf '      <Certificate>%s</Certificate>\n'  "${CERT_ESCAPED}"
              printf '      <PrivateKey>%s</PrivateKey>\n'    "${KEY_ESCAPED}"
              echo '      <Force>true</Force>'
              echo '    </CertificateConfiguration>'
              echo '  </Cname>'
              echo '</BucketCnameConfiguration>'
            } > "${XML_PATH}"

            echo "Putting cname certificate for ${d} ..."
            ossutil api put-cname \
              --bucket "${BUCKET}" \
              --bucket-cname-configuration "file://${XML_PATH}"

            ossutil api list-cname --bucket "${BUCKET}" \
              | grep "${d}" || true
          done

      - name: Summary
        shell: bash
        run: |
          echo "Updated OSS CNAME certificate for: ${DOMAINS}"
          echo "Bucket: ${BUCKET}"
          echo "Cert run label: ${CERT_NAME}"