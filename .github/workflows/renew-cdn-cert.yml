name: Renew SSL Certificate and Deploy to Aliyun CDN

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: renew-cdn-cert
  cancel-in-progress: true

jobs:
  renew-and-deploy:
    runs-on: ubuntu-latest

    env:
      CERT_DOMAIN: "blog.nicelylit.net"
      CDN_DOMAIN: "blog.nicelylit.net"
      ACME_HOME: "${{ github.workspace }}/.acme.sh"
      CERT_DIR: "${{ github.workspace }}/certs"
      ALIYUN_REGION_ID: "cn-beijing"
      RENEW_BEFORE_DAYS: "7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache acme.sh home
        uses: actions/cache@v4
        with:
          path: ${{ env.ACME_HOME }}
          key: acme-sh-${{ runner.os }}-${{ env.CERT_DOMAIN }}

      - name: Install Aliyun Python SDK
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install aliyun-python-sdk-core aliyun-python-sdk-cdn

      - name: Check CDN certificate expiration via OpenAPI
        id: certcheck
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ env.ALIYUN_REGION_ID }}
          CDN_DOMAIN: ${{ env.CDN_DOMAIN }}
          RENEW_BEFORE_DAYS: ${{ env.RENEW_BEFORE_DAYS }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, json, datetime, sys
          from aliyunsdkcore.client import AcsClient
          from aliyunsdkcdn.request.v20180510.DescribeDomainCertificateInfoRequest import DescribeDomainCertificateInfoRequest

          ak = os.environ["ALIYUN_ACCESS_KEY_ID"]
          sk = os.environ["ALIYUN_ACCESS_KEY_SECRET"]
          region = os.environ.get("ALIYUN_REGION_ID", "cn-hangzhou")
          domain = os.environ["CDN_DOMAIN"]
          threshold_days = int(os.environ.get("RENEW_BEFORE_DAYS", "7"))

          client = AcsClient(ak, sk, region)
          req = DescribeDomainCertificateInfoRequest()
          req.set_accept_format("json")
          req.set_DomainName(domain)

          resp = client.do_action_with_exception(req)
          data = json.loads(resp.decode("utf-8"))

          try:
            expire = data["CertInfos"]["CertInfo"][0]["CertExpireTime"]
          except Exception:
            print("ERROR: Unexpected response shape; cannot read CertInfos.CertInfo[0].CertExpireTime")
            print("Top-level keys:", list(data.keys()) if isinstance(data, dict) else type(data))
            # 打印一小段结构帮助排查（不打印证书内容）
            if isinstance(data, dict) and "CertInfos" in data:
              ci = data.get("CertInfos", {})
              if isinstance(ci, dict):
                print("CertInfos keys:", list(ci.keys()))
                if isinstance(ci.get("CertInfo"), list) and ci["CertInfo"]:
                  print("CertInfo[0] keys:", list(ci["CertInfo"][0].keys()))
            sys.exit(2)

          now = datetime.datetime.now(datetime.timezone.utc)
          exp = datetime.datetime.fromisoformat(expire.replace("Z", "+00:00"))
          days_left = int((exp - now).total_seconds() // 86400)
          should_renew = days_left <= threshold_days

          print(f"CDN cert expire: {expire} (days_left={days_left}, threshold={threshold_days})")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"expire={expire}\n")
            f.write(f"days_left={days_left}\n")
            f.write(f"should_renew={'true' if should_renew else 'false'}\n")
          PY

      - name: Install acme.sh
        if: steps.certcheck.outputs.should_renew == 'true'
        run: |
          set -euo pipefail
          curl https://get.acme.sh | sh -s email=secondorder11@outlook.com --home "${ACME_HOME}"
          echo "${ACME_HOME}" >> "$GITHUB_PATH"

      - name: Issue/Renew certificate (DNS Aliyun)
        if: steps.certcheck.outputs.should_renew == 'true'
        env:
          Ali_Key: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          Ali_Secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          set -euo pipefail
          acme.sh --issue --server letsencrypt --dns dns_ali -d "${CERT_DOMAIN}" --home "${ACME_HOME}"

      - name: Export certificate files
        if: steps.certcheck.outputs.should_renew == 'true'
        run: |
          set -euo pipefail
          mkdir -p "${CERT_DIR}"

          acme.sh --install-cert -d "${CERT_DOMAIN}" \
            --home "${ACME_HOME}" \
            --key-file "${CERT_DIR}/private.key" \
            --fullchain-file "${CERT_DIR}/fullchain.pem"

          openssl x509 -in "${CERT_DIR}/fullchain.pem" -noout -subject -issuer -enddate

      - name: Update CDN certificate via Aliyun OpenAPI
        if: steps.certcheck.outputs.should_renew == 'true'
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ env.ALIYUN_REGION_ID }}
          CDN_DOMAIN: ${{ env.CDN_DOMAIN }}
          CERT_PATH: ${{ env.CERT_DIR }}/fullchain.pem
          KEY_PATH: ${{ env.CERT_DIR }}/private.key
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, datetime
          from aliyunsdkcore.client import AcsClient
          from aliyunsdkcdn.request.v20180510.SetCdnDomainSSLCertificateRequest import SetCdnDomainSSLCertificateRequest

          ak = os.environ["ALIYUN_ACCESS_KEY_ID"]
          sk = os.environ["ALIYUN_ACCESS_KEY_SECRET"]
          region = os.environ.get("ALIYUN_REGION_ID", "cn-hangzhou")
          domain = os.environ["CDN_DOMAIN"]

          with open(os.environ["CERT_PATH"], "r", encoding="utf-8") as f:
              cert = f.read()
          with open(os.environ["KEY_PATH"], "r", encoding="utf-8") as f:
              key = f.read()

          client = AcsClient(ak, sk, region)
          req = SetCdnDomainSSLCertificateRequest()
          req.set_accept_format("json")

          req.set_DomainName(domain)
          req.set_SSLProtocol("on")
          req.set_CertName("auto-renew-" + datetime.datetime.utcnow().strftime("%Y%m%dT%H%M%SZ"))
          req.set_SSLPub(cert)
          req.set_SSLPri(key)

          resp = client.do_action_with_exception(req)
          print(resp.decode("utf-8"))
          PY

      - name: No renewal needed
        if: steps.certcheck.outputs.should_renew != 'true'
        run: |
          echo "No renewal needed. CDN cert expire='${{ steps.certcheck.outputs.expire }}', days_left='${{ steps.certcheck.outputs.days_left }}'."

      - name: Summary
        if: always()
        run: |
          {
            echo "## CDN cert check"
            echo ""
            echo "- Domain: \`${{ env.CDN_DOMAIN }}\`"
            echo "- Expire (API): \`${{ steps.certcheck.outputs.expire }}\`"
            echo "- Days left: \`${{ steps.certcheck.outputs.days_left }}\`"
            echo "- Should renew: \`${{ steps.certcheck.outputs.should_renew }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          rm -rf "${CERT_DIR}" || true