name: Deploy secondorder site to Aliyun OSS

on:
  push:
    branches: [ "main" ]   # 按你的分支改
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-oss
  cancel-in-progress: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: |
          hugo --minify

      - name: Install ossutil
        run: |
          set -euo pipefail
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) PKG="ossutil-v1.7.19-linux-amd64.zip" ;;
            aarch64|arm64) PKG="ossutil-v1.7.19-linux-arm64.zip" ;;
            *) echo "Unsupported arch: $ARCH" && exit 1 ;;
          esac

          curl -fsSL "https://gosspublic.alicdn.com/ossutil/1.7.19/${PKG}" -o ossutil.zip
          unzip -q ossutil.zip
          # 解压出来一般是 ossutil 目录，里面有 ossutil 可执行文件
          sudo mv ossutil*/ossutil /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil
          ossutil --version || true

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          ossutil config -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -e "$OSS_ENDPOINT"

      - name: Sync to OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          # 将 public/ 同步到 bucket 根目录
          # --delete：让 OSS 上不存在于 public/ 的文件被删除（避免旧页面残留）
          ossutil sync -f --delete public "oss://$OSS_BUCKET/"