# config.yaml
baseurl: https://secondorder.net
title: 有点稳 (Second Order)
theme: stack
paginate: 10
summaryLength: 80
defaultContentLanguage: zh-cn

languages:
    zh-cn:
        locale: zh-cn
        contentDir: content/zh-cn
        label: 中文
        title: 有点稳
        weight: 1

        menu:
            main:
                - identifier: home
                  name: 首页
                  url: /
                  weight: 1
                  params:
                      icon: home

                - identifier: engineering
                  name: 工程
                  url: /categories/engineering/
                  weight: 2
                  params:
                      icon: tool

                - identifier: writing
                  name: 随笔
                  url: /categories/writing/
                  weight: 3
                  params:
                      icon: feather

                - identifier: archives
                  name: 归档
                  url: /archives/
                  weight: 4
                  params:
                      icon: archives

                - identifier: search
                  name: 搜索
                  url: /search/
                  weight: 5
                  params:
                      icon: search

                - identifier: links
                  name: 友情链接
                  url: /links/
                  weight: 6
                  params:
                      icon: link

                - identifier: about
                  name: 关于
                  url: /about/
                  weight: 7
                  params:
                      icon: user

            social:
                - identifier: github
                  name: GitHub
                  url: https://github.com/nicelylit/secondorder-site
                  params:
                      icon: brand-github

                - identifier: rss
                  name: RSS
                  url: /index.xml
                  params:
                      icon: rss

        params:
            description: 记录软件工程中的真实问题、底层方法，以及技术之外，关于成长、观察与内省的思考。
            sidebar:
                subtitle: 在复杂系统中寻找清晰，在变化中保持清醒。
                # subtitle: 一个软件工程师的两种修行：在复杂系统中有效行动，在不确定性中保持清醒。

    en:
        locale: en-us
        contentDir: content/en
        label: English
        title: Second Order
        weight: 2

        menu:
            main:
                - identifier: home
                  name: Home
                  url: /en/
                  weight: 1
                  params:
                      icon: home

                - identifier: engineering
                  name: Engineering
                  url: /en/categories/engineering/
                  weight: 2
                  params:
                      icon: tool

                - identifier: writing
                  name: Writing
                  url: /en/categories/writing/
                  weight: 3
                  params:
                      icon: feather

                - identifier: archives
                  name: Archives
                  url: /en/archives/
                  weight: 4
                  params:
                      icon: archives

                - identifier: search
                  name: Search
                  url: /en/search/
                  weight: 5
                  params:
                      icon: search

                - identifier: links
                  name: Links
                  url: /en/links/
                  weight: 6
                  params:
                      icon: link

                - identifier: about
                  name: About
                  url: /en/about/
                  weight: 7
                  params:
                      icon: user

            social:
                - identifier: github
                  name: GitHub
                  url: https://github.com/nicelylit/secondorder-site
                  params:
                      icon: brand-github

                - identifier: rss
                  name: RSS
                  url: /en/index.xml
                  params:
                      icon: rss

        params:
            description: Real problems and fundamental methods in software engineering, plus reflections on growth, observation, and introspection beyond code.
            sidebar:
                # subtitle: "Two disciplines: effective action in complex systems, clarity in uncertainty."
                subtitle: Seeking clarity in complex systems, staying clear amid change.

params:
    mainSections:
        - posts

    favicon: /favicon.ico

    sidebar:
        avatar: /img/avatar.png

    article:
        math: true
        toc: true
        readingTime: true

    widgets:
        homepage:
            - type: archives
            - type: tag-cloud

outputs:
    home:
        - HTML
        - RSS
        - JSON

taxonomies:
    category: categories
    tag: tags
    series: series

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        noClasses: false
        codeFences: true
